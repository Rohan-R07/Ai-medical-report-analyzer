    <path d="M 32,68 L 43,68 L 47,48 L 52,82 L 56,58 L 60,68 L 68,68" 
          fill="none" 
          stroke="url(#pulseGrad)" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    <circle cx="68" cy="68" r="4.5" fill="#ba1a1a" stroke="#FFFFFF" stroke-width="1.5" />
    <circle cx="47" cy="48" r="2.5" fill="#006d3e" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Typography Block -->
  <text x="100" y="165" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="28" 
        font-weight="700" 
        letter-spacing="0.2em" 
