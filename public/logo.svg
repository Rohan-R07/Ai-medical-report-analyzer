<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#008B81" />
      <stop offset="100%" stop-color="#00524B" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>

  <!-- Scale-adjusted Icon (centered at x=100, y=80) -->
  <g transform="translate(50, 20) scale(1.0)">
    <path d="M50,12 C50,12 80,52 80,68 C80,83.5 66.5,92 50,92 C33.5,92 20,83.5 20,68 C20,52 50,12 50,12 Z" 
          fill="url(#dropGrad)" 
