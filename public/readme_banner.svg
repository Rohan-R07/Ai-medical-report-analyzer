<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <!-- Background Slate/Teal gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071b19" />
      <stop offset="50%" stop-color="#0c2321" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00C4B5" />
      <stop offset="100%" stop-color="#00685f" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008B81" stop-opacity="0" />
      <stop offset="50%" stop-color="#008B81" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#008B81" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Solid Background canvas -->
  <rect width="800" height="240" fill="url(#bgGrad)" rx="16" />

  <!-- Abstract decorative grids -->
  <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200" 
        stroke="url(#gridGrad)" stroke-width="1" />
  <path d="M 100,0 L 100,240 M 200,0 L 200,240 M 300,0 L 300,240 M 400,0 L 400,240 M 500,0 L 500,240 M 600,0 L 600,240 M 700,0 L 700,240" 
        stroke="url(#gridGrad)" stroke-width="1" />

  <!-- Abstract Data Curve (Wave) in background -->
  <path d="M -50,180 C 150,220 250,80 450,150 C 650,220 700,110 850,130" 
        fill="none" stroke="#00685f" stroke-width="4" stroke-opacity="0.25" stroke-linecap="round"/>
  <path d="M -50,180 C 150,220 250,80 450,150 C 650,220 700,110 850,130" 
        fill="none" stroke="#00C4B5" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Logo Group -->
  <g transform="translate(60, 80)">
    <!-- Scale-adjusted Icon on Left -->
    <g transform="translate(0, -15) scale(0.9)">
      <path d="M50,12 C50,12 80,52 80,68 C80,83.5 66.5,92 50,92 C33.5,92 20,83.5 20,68 C20,52 50,12 50,12 Z" 
            fill="url(#dropGrad)" 
            filter="drop-shadow(0px 8px 16px rgba(0, 196, 181, 0.2))" />
      <path d="M 32,68 L 43,68 L 47,48 L 52,82 L 56,58 L 60,68 L 68,68" 
            fill="none" 
            stroke="url(#pulseGrad)" 
            stroke-width="3" 
            stroke-linecap="round" 
            stroke-linejoin="round" />
      <circle cx="68" cy="68" r="4.5" fill="#ba1a1a" stroke="#FFFFFF" stroke-width="1.5" />
      <circle cx="47" cy="48" r="2.5" fill="#006d3e" stroke="#FFFFFF" stroke-width="1" />
    </g>

    <!-- Logotype Typography -->
    <text x="100" y="30" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="36" 
          font-weight="800" 
          letter-spacing="0.28em" 
          fill="#FFFFFF">VITALS</text>

    <text x="100" y="52" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="9" 
          font-weight="600" 
          letter-spacing="0.18em" 
          fill="#00C4B5">AI-POWERED CBC MEDICAL REPORT ANALYZER</text>
  </g>

  <!-- Badges / Bullet points on right -->
  <g transform="translate(480, 75)" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing="0.05em">
    <g transform="translate(0, 0)">
      <circle cx="0" cy="-4" r="3.5" fill="#00C4B5" />
      <text x="15" y="0">Deterministic PDF Parser &amp; OCR Fallback</text>
    </g>
    <g transform="translate(0, 30)">
      <circle cx="0" cy="-4" r="3.5" fill="#00C4B5" />
      <text x="15" y="0">Random Forest Classifier Anemia Predictor</text>
    </g>
    <g transform="translate(0, 60)">
      <circle cx="0" cy="-4" r="3.5" fill="#00C4B5" />
      <text x="15" y="0">OpenRouter Gemma-4 Recommendation Engine</text>
    </g>
    <g transform="translate(0, 90)">
      <circle cx="0" cy="-4" r="3.5" fill="#ba1a1a" />
      <text x="15" y="0">Verified Healthcare Partner Ecosystem Preview</text>
    </g>
  </g>
</svg>
