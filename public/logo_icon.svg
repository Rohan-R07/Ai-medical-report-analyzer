<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#008B81" />
      <stop offset="100%" stop-color="#00524B" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>
  <!-- Background drop container with clinical shadows -->
  <path d="M50,12 C50,12 80,52 80,68 C80,83.5 66.5,92 50,92 C33.5,92 20,83.5 20,68 C20,52 50,12 50,12 Z" 
        fill="url(#dropGrad)" 
        filter="drop-shadow(0px 8px 16px rgba(0, 104, 95, 0.25))" />
        
  <!-- Glowing ECG Pulse line & AI nodes -->
  <path d="M 32,68 L 43,68 L 47,48 L 52,82 L 56,58 L 60,68 L 68,68" 
        fill="none" 
        stroke="url(#pulseGrad)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- AI Neural Connection Node -->
  <circle cx="68" cy="68" r="4.5" fill="#ba1a1a" stroke="#FFFFFF" stroke-width="1.5" />
  <circle cx="47" cy="48" r="2.5" fill="#006d3e" stroke="#FFFFFF" stroke-width="1" />
</svg>
