<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background Slate/Teal gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071b19" />
      <stop offset="50%" stop-color="#0c2321" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00C4B5" />
      <stop offset="100%" stop-color="#00685f" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008B81" stop-opacity="0" />
      <stop offset="50%" stop-color="#008B81" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#008B81" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Solid Background canvas -->
  <rect width="1280" height="640" fill="url(#bgGrad)" rx="24" />

  <!-- Abstract decorative grids -->
  <path d="M 0,100 L 1280,100 M 0,200 L 1280,200 M 0,300 L 1280,300 M 0,400 L 1280,400 M 0,500 L 1280,500" 
        stroke="url(#gridGrad)" stroke-width="1.5" />
  <path d="M 200,0 L 200,640 M 400,0 L 400,640 M 600,0 L 600,640 M 800,0 L 800,640 M 1000,0 L 1000,640" 
        stroke="url(#gridGrad)" stroke-width="1.5" />

  <!-- Decorative Waves -->
  <path d="M -100,480 C 300,560 500,200 800,380 C 1100,560 1150,300 1380,350" 
        fill="none" stroke="#00685f" stroke-width="8" stroke-opacity="0.2" stroke-linecap="round"/>
  <path d="M -100,480 C 300,560 500,200 800,380 C 1100,560 1150,300 1380,350" 
        fill="none" stroke="#00C4B5" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- Logo Group (Centered horizontally, shifted up slightly) -->
  <g transform="translate(640, 240)" text-anchor="middle">
    <!-- Icon centered at (0, -60) -->
    <g transform="translate(-50, -110) scale(1.3)">
      <path d="M50,12 C50,12 80,52 80,68 C80,83.5 66.5,92 50,92 C33.5,92 20,83.5 20,68 C20,52 50,12 50,12 Z" 
            fill="url(#dropGrad)" 
            filter="drop-shadow(0px 8px 16px rgba(0, 196, 181, 0.35))" />
      <path d="M 32,68 L 43,68 L 47,48 L 52,82 L 56,58 L 60,68 L 68,68" 
            fill="none" 
            stroke="url(#pulseGrad)" 
            stroke-width="3" 
            stroke-linecap="round" 
            stroke-linejoin="round" />
      <circle cx="68" cy="68" r="4.5" fill="#ba1a1a" stroke="#FFFFFF" stroke-width="1.5" />
      <circle cx="47" cy="48" r="2.5" fill="#006d3e" stroke="#FFFFFF" stroke-width="1" />
    </g>

    <!-- Logotype Typography -->
    <text x="0" y="45" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="56" 
          font-weight="800" 
          letter-spacing="0.32em" 
          fill="#FFFFFF">VITALS</text>

    <text x="0" y="80" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="14" 
          font-weight="600" 
          letter-spacing="0.22em" 
          fill="#00C4B5">AI-POWERED CBC MEDICAL REPORT ANALYZER</text>
          
    <text x="0" y="140" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="16" 
          font-weight="400" 
          fill="#94a3b8"
          max-width="600">
      Deterministic PDF Extraction • Random Forest Classifier • OpenRouter Gemma-4 Recommendations
    </text>
  </g>
</svg>
